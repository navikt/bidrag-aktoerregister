server.servlet.context-path=/bidrag-aktoerregister
server.port=8080

springdoc.swagger-ui.path=/

# TODO: Need to configure this properly later
no.nav.security.jwt.issuer.maskinporten.discovery-url=${MASKINPORTEN_WELL_KNOWN_URL:https://ver2.maskinporten.no/.well-known/oauth-authorization-server}
no.nav.security.jwt.issuer.maskinporten.validation.optional-claims=sub,aud,nbf

org.jobrunr.background-job-server.enabled=false
org.jobrunr.dashboard.enabled=false
org.jobrunr.background-job-server.worker-count=4

# Disable Hibernate schema generation/application
spring.jpa.hibernate.ddl-auto=none

# Flyway
spring.flyway.schemas=migrations
spring.flyway.locations=classpath:db/migration

mq.tpsRequestQueue=test