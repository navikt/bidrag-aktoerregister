apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: {{ name }}
  namespace: bidrag
  labels:
    team: bidrag
spec:
  image: {{ image }}
  gcp:
    sqlInstances:
      - name: {{ dbinstancename }}
        type: POSTGRES_12
        databases:
        - name: {{ dbname }}
          envVarPrefix: DB
  liveness:
    path: /actuator/health
    initialDelay: 20
    timeout: 2
    periodSeconds: 5
    failureThreshold: 5
  readiness:
    path: /actuator/health
    initialDelay: 20
    timeout: 2
  resources:
    limits:
      cpu: 1000m
      memory: 2048Mi
    requests:
      cpu: 500m
      memory: 1024Mi
  replicas:
    cpuThresholdPercentage: 80
  maskinporten:
    enabled: true
    scopes:
      exposes:
        - name: "aktoerregister.read"
          enabled: true
          product: "bidrag"
          allowedIntegrations:
            - maskinporten
          atMaxAge: 120
          consumers:
            - name: "NAV"
              orgno: "889640782"
            - name: "Skatteetaten"
              orgno: "974761076"
  envFrom:
    - secret: bidrag-aktoerregister-mqpassword
  ingresses:
  {{#each ingresses as |url|}}
     - {{url}}
  {{/each}}
  env:
  {{#each env}}
     - name: {{this.name}}
       value: "{{this.value}}"
  {{/each}}
